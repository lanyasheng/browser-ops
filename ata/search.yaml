site: ata
name: search
description: "搜索 ATA 文章 (使用 Chrome 登录态)"
strategy: cookie
browser: true
domain: ata.atatech.org

args:
  keyword:
    type: str
    required: true
    description: Search keyword
  limit:
    type: int
    default: 20
    description: Number of items to return

pipeline:
  - navigate: https://ata.atatech.org/search?q=${{ args.keyword | urlencode }}&type=article
  - wait: 3000

  - evaluate: |
      (() => {
        const strip = (html) => (html || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
        const limit = ${{ args.limit }};
        const cards = document.querySelectorAll('[class*="resultItem"], [class*="search-item"], [class*="SearchResult"]');
        const results = [];

        if (cards.length > 0) {
          cards.forEach(card => {
            const a = card.querySelector('a[href*="articles"]') || card.querySelector('a');
            if (!a) return;
            const title = strip(a.textContent || '');
            const url = a.href || '';
            if (title.length > 3 && url) {
              results.push({ title: title.substring(0, 120), url });
            }
          });
        }

        if (results.length === 0) {
          const links = document.querySelectorAll('a[href*="articles"]');
          links.forEach(a => {
            const title = strip(a.textContent || '');
            const url = a.href || '';
            if (title.length > 10 && url.includes('ata')) {
              results.push({ title: title.substring(0, 120), url });
            }
          });
        }

        return results.slice(0, limit);
      })()

  - map:
      title: ${{ item.title }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}

columns: [title, url]
